<!-- ============================================================
  JP Lessons — Webflow Custom Code Embed
  Paste this into Webflow > Page Settings > Custom Code > Before </body>
  (or into a Custom Code embed element on the page).

  SERVING MODES — set window.RIKIZO_CONFIG before this script runs:
    Gated page (new students):    window.RIKIZO_CONFIG = { mode: 'gated' };
    Unlocked page (existing):     window.RIKIZO_CONFIG = { mode: 'free'  };
  Default (no config set) = gated.

  Load order enforced by this loader:
    1. app/shared/asset-loader.js   — URL builder, manifest, fetchJSON
    2. app/shared/tts.js            — Text-to-speech with voice selection
    3. app/shared/stamp-settings.js — Character stamp picker (stamp selection)
    4. app/shared/tts-settings.js   — Settings modal (stamp picker, voice, speed)
    5. app/shared/progress.js       — localStorage: flags, scores, drafts
    6. app/shared/unlock.js         — Content gating / progressive unlock engine
    7. app/shared/text-processor.js — Conjugation engine, processText
    8. app/shared/term-modal.js     — Shared term modal overlay
    8. Feature module (on demand)   — Lesson / Practice / Review / Compose / Story / Grammar
  ============================================================ -->

<!-- Default serving mode — override on each Webflow page embed before this block -->
<script>
window.RIKIZO_CONFIG = window.RIKIZO_CONFIG || { mode: 'gated' };
</script>

<div id="app-main-container"></div>
<script>
window.JPApp = {
  // --- CONFIGURATION ---
  config: {
    owner: "gryswynd",
    repo: "jp-lessons",
    branch: "main",
    path: ""
  },

  // --- STATE ---
  state: {
    flags: JSON.parse(localStorage.getItem('k-flags') || '{}')
  },

  // --- INLINE GATE CHECK (works before unlock.js loads) ---
  // Reads localStorage directly so the menu can be rendered immediately on init.
  _isModuleVisible: function(module) {
    var cfg = window.RIKIZO_CONFIG;
    if (cfg && cfg.mode === 'free') return true;
    // Delegate to unlock.js once loaded.
    if (window.JPShared && window.JPShared.unlock) {
      return window.JPShared.unlock.isModuleVisible(module);
    }
    // Inline fallback (mirrors unlock.js logic using raw localStorage).
    var scores    = JSON.parse(localStorage.getItem('k-lesson-scores')    || '{}');
    var completed = JSON.parse(localStorage.getItem('k-lesson-completed') || '{}');
    var pass = function(id) { return (scores[id] || 0) >= 75; };
    var done = function(id) { return !!completed[id]; };
    switch (module) {
      case 'lesson':   return true;
      case 'grammar':  return done('N5.1');
      case 'practice': return done('N5.1');
      case 'compose':  return pass('N5.1');
      case 'game':     return pass('N5.1');
      case 'story':    return pass('N5.2');
      case 'review':   return pass('N5.2');
      default:         return false;
    }
  },

  // --- HELPER: Fetch and inject a JS module from GitHub raw ---
  loadModule: async function(fileName) {
    var url = 'https://raw.githubusercontent.com/' +
              this.config.owner + '/' + this.config.repo + '/' +
              this.config.branch + '/' + fileName;
    var cacheBuster = url + '?t=' + Date.now();
    try {
      var res = await fetch(cacheBuster);
      if (!res.ok) throw new Error('Failed to load ' + fileName);
      var code = await res.text();
      var script = document.createElement('script');
      script.textContent = code;
      document.body.appendChild(script);
      console.log('[JPApp] Loaded:', fileName);
      return true;
    } catch (err) {
      console.error('[JPApp] Error loading ' + fileName + ':', err);
      this.container.innerHTML =
        '<div style="color:red;text-align:center;padding:20px;">' +
        'Error loading ' + fileName + ':<br>' + err.message +
        '</div>' +
        '<button onclick="JPApp.renderMenu()" ' +
        'style="margin:20px auto;display:block;">Back</button>';
      return false;
    }
  },

  // --- INIT ---
  init: function() {
    this.container = document.getElementById('app-main-container');
    if (!this.container) return console.error('Container #app-main-container not found');
    this.renderMenu();
  },

  // --- RENDER MENU ---
  renderMenu: function() {
    var self = this;
    this.container.innerHTML = '';
    var style = '<style>' +
      '.jp-main-menu{width:100%;max-width:600px;margin:0 auto;' +
      'font-family:"Poppins",sans-serif;text-align:center;display:grid;gap:15px;padding:20px;}' +
      '.jp-menu-btn{background:white;padding:25px;border-radius:16px;' +
      'box-shadow:0 4px 15px rgba(0,0,0,0.05);cursor:pointer;transition:transform 0.2s;' +
      'border:1px solid rgba(0,0,0,0.05);display:flex;flex-direction:column;align-items:center;}' +
      '.jp-menu-btn:active{transform:scale(0.98);}' +
      '.jp-menu-title{font-size:1.2rem;font-weight:900;color:#4e54c8;margin-bottom:5px;}' +
      '.jp-menu-desc{color:#747d8c;font-size:0.9rem;}' +
      '.jp-game-wrap{position:relative;}' +
      '.jp-construction-sticker{position:absolute;top:14px;right:14px;' +
      'background:linear-gradient(135deg,#FF9800,#F44336);color:white;' +
      'font-size:0.65rem;font-weight:700;padding:4px 10px;border-radius:20px;' +
      'transform:rotate(8deg);box-shadow:0 2px 8px rgba(0,0,0,0.25);' +
      'letter-spacing:0.3px;white-space:nowrap;pointer-events:none;}' +
      '</style>';

    // Helper — build a module button or nothing if gated+locked.
    // clickMode: the mode string passed to JPApp.launch()
    // Returns an HTML string or '' if the module is hidden.
    function btn(clickMode, borderColor, titleColor, iconAndTitle, desc, wrap) {
      if (!self._isModuleVisible(clickMode)) return '';
      var inner =
        '<div class="jp-menu-btn" onclick="JPApp.launch(\'' + clickMode + '\')" style="border-top:3px solid ' + borderColor + ';">' +
          '<div class="jp-menu-title" style="color:' + titleColor + ';">' + iconAndTitle + '</div>' +
          '<div class="jp-menu-desc">' + desc + '</div>' +
        '</div>';
      if (wrap) {
        return '<div class="jp-game-wrap">' + inner + wrap + '</div>';
      }
      return inner;
    }

    var html = style +
      '<div class="jp-main-menu" style="position:relative;">' +
        '<button onclick="JPApp.openTtsSettings()" title="Voice Settings" style="position:absolute;top:15px;right:15px;background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.1);color:#666;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1.3rem;display:flex;align-items:center;justify-content:center;padding:0;">\u2699</button>' +
        '<h1 style="color:#2f3542;font-weight:900;">\uD83C\uDDEF\uD83C\uDDF5 Japanese Master</h1>' +
        // Lessons — always visible
        '<div class="jp-menu-btn" onclick="JPApp.launch(\'lesson\')" style="border-top:3px solid #4e54c8;">' +
          '<div class="jp-menu-title" style="color:#4e54c8;">\uD83D\uDCDA Lessons</div>' +
          '<div class="jp-menu-desc">Structured paths &amp; reading</div>' +
        '</div>' +
        // Grammar Garden — unlocks on any N5.1 completion
        btn('grammar', '#16A34A', '#16A34A', '\uD83C\uDF3F Grammar Garden', 'Particles, conjugation &amp; sentence patterns') +
        // Dojo — unlocks on any N5.1 completion
        btn('practice', '#DC2626', '#DC2626', '\uD83E\uDD4B Dojo', 'Flashcards &amp; Quizzes') +
        // Compose — unlocks on N5.1 ≥75%
        btn('compose', '#00897B', '#00897B', '\u270F\uFE0F Compose', 'Write Japanese with guided prompts') +
        // Stories — unlocks on N5.2 ≥75%
        btn('story', '#D97706', '#D97706', '\uD83D\uDCD6 Stories', 'Read Japanese stories with furigana') +
        // Review — unlocks on N5.2 ≥75%
        btn('review', '#7C3AED', '#7C3AED', '\uD83D\uDCDD Review', 'Assessment &amp; Drills') +
        // Game — unlocks on N5.1 ≥75% (Under Construction sticker)
        btn('game', '#F48FB1', '#C2185B', '\uD83C\uDFAE Rikizo\'s Adventures', 'Explore interactive Japanese adventures',
            '<div class="jp-construction-sticker">\uD83D\uDEA7 Under Construction</div>') +
        // Teacher Bingo — always visible (teacher tool, no gate)
        '<div class="jp-game-wrap">' +
          '<div class="jp-menu-btn" onclick="JPApp.launch(\'teacher-bingo\')" style="border-top:3px solid #FF5722;background:linear-gradient(135deg,#fff 80%,#fff3e0);">' +
            '<div class="jp-menu-title" style="color:#FF5722;">\uD83C\uDFB2 Kanji Bingo Caller</div>' +
            '<div class="jp-menu-desc">Random kanji generator for bingo games</div>' +
          '</div>' +
          '<div class="jp-construction-sticker" style="background:linear-gradient(135deg,#FF9800,#E91E63);">\uD83C\uDFB2 Teacher\'s Tool</div>' +
        '</div>' +
      '</div>';
    this.container.innerHTML = html;
  },

  // --- TTS SETTINGS (accessible from main menu before modules load) ---
  openTtsSettings: async function() {
    if (window.JPShared && window.JPShared.ttsSettings) {
      if (window.JPShared.stampSettings) {
        window.JPShared.stampSettings.setConfig(this.config);
      }
      window.JPShared.ttsSettings.open();
      return;
    }
    // Load TTS modules on demand (silently — don't clobber menu on error)
    try {
      window.JPShared = window.JPShared || {};
      var savedHtml = this.container.innerHTML;
      await this.loadModule('app/shared/asset-loader.js');
      await this.loadModule('app/shared/tts.js');
      await this.loadModule('app/shared/stamp-settings.js');
      if (window.JPShared.stampSettings) {
        window.JPShared.stampSettings.setConfig(this.config);
      }
      await this.loadModule('app/shared/tts-settings.js');
      // Restore menu if loadModule error-displayed something
      if (!window.JPShared.ttsSettings) {
        this.container.innerHTML = savedHtml;
        return;
      }
      this.container.innerHTML = savedHtml;
      window.JPShared.ttsSettings.open();
    } catch (e) {
      console.error('Could not load TTS settings:', e);
    }
  },

  // --- LAUNCHER ---
  // Shared modules are loaded once per session (idempotent guard on JPShared.assets).
  // Feature modules are loaded once per session (idempotent guard on their window global).
  launch: async function(mode) {
    this.container.innerHTML =
      '<div style="padding:40px;text-align:center;color:#888;">' +
      'Fetching latest code from GitHub...</div>';

    // ── Step 1: Load shared modules (first launch only, in required order) ──
    // Guard: asset-loader.js sets window.JPShared.assets when it runs.
    if (!window.JPShared || !window.JPShared.assets) {
      var sharedModules = [
        'app/shared/asset-loader.js',   // 1. URL builder, manifest, fetchJSON
        'app/shared/tts.js',            // 2. speak() / cancel() / voice selection
        'app/shared/stamp-settings.js', // 3. Character stamp picker
        'app/shared/tts-settings.js',   // 4. Settings modal (depends on 2, 3)
        'app/shared/progress.js',       // 5. flags, scores, drafts via localStorage
        'app/shared/unlock.js',         // 6. content gating / progressive unlock
        'app/shared/text-processor.js', // 7. conjugate(), processText(), getRootTerm()
        'app/shared/term-modal.js'      // 8. term overlay (depends on 2, 5, 6)
      ];
      for (var i = 0; i < sharedModules.length; i++) {
        var ok = await this.loadModule(sharedModules[i]);
        if (!ok) return; // loadModule already showed an error in the container
      }
    }

    // ── Step 2: Load and start the requested feature module ──
    var onExit = (function(self) { return function() { self.renderMenu(); }; })(this);

    if (mode === 'lesson') {
      if (!window.LessonModule) {
        var ok = await this.loadModule('Lesson.js');
        if (!ok) return;
      }
      if (window.LessonModule) window.LessonModule.start(this.container, this.config, onExit);

    } else if (mode === 'practice') {
      if (!window.PracticeModule) {
        var ok = await this.loadModule('Practice.js');
        if (!ok) return;
      }
      if (window.PracticeModule) window.PracticeModule.start(this.container, this.config, onExit);

    } else if (mode === 'review') {
      if (!window.ReviewModule) {
        var ok = await this.loadModule('Review.js');
        if (!ok) return;
      }
      if (window.ReviewModule) window.ReviewModule.start(this.container, this.config, onExit);

    } else if (mode === 'compose') {
      if (!window.ComposeModule) {
        var ok = await this.loadModule('Compose.js');
        if (!ok) return;
      }
      if (window.ComposeModule) window.ComposeModule.start(this.container, this.config, onExit);

    } else if (mode === 'story') {
      if (!window.StoryModule) {
        var ok = await this.loadModule('Story.js');
        if (!ok) return;
      }
      if (window.StoryModule) window.StoryModule.start(this.container, this.config, onExit);

    } else if (mode === 'grammar') {
      if (!window.GrammarModule) {
        var ok = await this.loadModule('Grammar.js');
        if (!ok) return;
      }
      if (window.GrammarModule) window.GrammarModule.start(this.container, this.config, onExit);

    } else if (mode === 'game') {
      if (!window.GameModule) {
        var ok = await this.loadModule('Game.js');
        if (!ok) return;
      }
      if (window.GameModule) window.GameModule.start(this.container, this.config, onExit);

    } else if (mode === 'teacher-bingo') {
      if (!window.KanjiBingoGeneratorModule) {
        var ok = await this.loadModule('KanjiBingoGenerator.js');
        if (!ok) return;
      }
      if (window.KanjiBingoGeneratorModule) window.KanjiBingoGeneratorModule.start(this.container, this.config, onExit);
    }
  }
};

// Start App
document.addEventListener('DOMContentLoaded', function() { window.JPApp.init(); });
</script>
